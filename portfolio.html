<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Explore Fox & Timber brand identity, illustration, apparel, monogram, and brand system work.">
  <meta name="theme-color" content="#171717">
  <title>Our Work | Fox &amp; Timber</title>
  <link rel="icon" href="img/favicon.ico">
  <link rel="apple-touch-icon" href="img/favicon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="portfolio-page">
  <div data-include="includes/header.htm"></div>
  <main>

<section class="page-hero portfolio-hero">
  <p class="kicker">Our work</p>
  <h1>Ideas made visible.</h1>
  <p>Selected pieces from the Fox &amp; Timber identity and the broader system built around it.</p>
</section>
<section class="portfolio-grid section-pad">
<button class="portfolio-card reveal" type="button" data-src="img/primary-logo.jpg" data-title="Primary identity" data-description="The core Fox & Timber emblem combining the fox, mountain range, sun, and timber into one recognizable mark.">
  <img src="img/primary-logo.jpg" alt="Primary identity">
  <span><b>Primary identity</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/wordmark-horizontal.png" data-title="Horizontal wordmark" data-description="A wide identity lockup designed for navigation, letterheads, signage, and long-format applications.">
  <img src="img/wordmark-horizontal.png" alt="Horizontal wordmark">
  <span><b>Horizontal wordmark</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/creative-horizontal.png" data-title="Creative studio lockup" data-description="An earlier descriptor system showing how the identity could adapt to different business positioning.">
  <img src="img/creative-horizontal.png" alt="Creative studio lockup">
  <span><b>Creative studio lockup</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/creative-stacked.jpg" data-title="Stacked identity" data-description="A vertical lockup suited to social graphics, printed pieces, and square-format brand applications.">
  <img src="img/creative-stacked.jpg" alt="Stacked identity">
  <span><b>Stacked identity</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/monogram.png" data-title="FT monogram" data-description="A compact monogram blending the initials with the fox and timber imagery for small-format use.">
  <img src="img/monogram.png" alt="FT monogram">
  <span><b>FT monogram</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/pencil-logo.jpg" data-title="Hand-drawn exploration" data-description="An illustrative pencil treatment showing how the brand can move from clean vector identity into organic artwork.">
  <img src="img/pencil-logo.jpg" alt="Hand-drawn exploration">
  <span><b>Hand-drawn exploration</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/shirt-mockup.jpg" data-title="Apparel concept" data-description="A complete product visualization demonstrating how an identity becomes something a customer can already imagine wearing.">
  <img src="img/shirt-mockup.jpg" alt="Apparel concept">
  <span><b>Apparel concept</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/global-map.jpg" data-title="Global reach graphic" data-description="A location and capability graphic positioning the Durango-based company as an international collaborator.">
  <img src="img/global-map.jpg" alt="Global reach graphic">
  <span><b>Global reach graphic</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
<button class="portfolio-card reveal" type="button" data-src="img/palette.jpg" data-title="Color system" data-description="The expanded Fox & Timber palette for brand applications, campaigns, seasonal work, and visual storytelling.">
  <img src="img/palette.jpg" alt="Color system">
  <span><b>Color system</b><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
</button>
</section>
<div class="portfolio-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
  <div class="modal-panel">
    <button class="modal-close" type="button" aria-label="Close image"><i class="fa-solid fa-xmark"></i></button>
    <img class="modal-image" src="" alt="">
    <div class="modal-copy"><h2 id="modal-title"></h2><p></p></div>
  </div>
</div>

  </main>
  <div data-include="includes/footer.htm"></div>
  <script src="js/scripts.js" defer></script>
</body>
</html>
